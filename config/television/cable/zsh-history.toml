[metadata]
name = "zsh-history"
description = "A channel to select from your zsh history"
requirements = ["zsh"]

[source]
command = "tac ${HISTFILE:-${HOME}/.zsh_history} | sed 's/^: [0-9]*:[0-9]*;//' | awk '!seen[$0]++'"
display = "{}"
output = "{}"
no_sort = true
frecency = false

[actions.execute]
description = "Execute the selected command"
command = "zsh -c '{}'"
mode = "execute"
